name: Build AutoAssemble v4

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AutoAssemble_v4_Windows
            exe_name: auto_assemble_v4.exe
          - os: macos-latest
            artifact_name: AutoAssemble_v4_macOS
            exe_name: auto_assemble_v4

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name auto_assemble_v4 auto_assemble_v4.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoAssemble_v4_Windows
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoAssemble_v4_macOS
          path: release/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/auto_assemble_v4.exe
            release/macos/auto_assemble_v4
          generate_release_notes: true
