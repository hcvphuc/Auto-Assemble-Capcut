name: Build AutoAssemble v4

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────
  # Windows build (unchanged)
  # ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name auto_assemble_v4 auto_assemble_v4.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoAssemble_v4_Windows
          path: dist/auto_assemble_v4.exe

  # ────────────────────────────────────────────────────────
  # macOS Intel (x86_64) build
  # ────────────────────────────────────────────────────────
  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build and sign (Intel x86_64)
        run: |
          pyinstaller --onedir --windowed --name AutoAssemble_v4 auto_assemble_v4.py
          echo "=== Architecture ==="
          file dist/AutoAssemble_v4.app/Contents/MacOS/AutoAssemble_v4
          codesign --force --deep --sign - dist/AutoAssemble_v4.app
          # TAR to preserve permissions & symlinks (upload-artifact zip breaks .app)
          cd dist && tar czf ../intel-app.tar.gz AutoAssemble_v4.app

      - name: Upload Intel app (tar)
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-tar
          path: intel-app.tar.gz

  # ────────────────────────────────────────────────────────
  # macOS ARM (Apple Silicon) build
  # ────────────────────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build and sign (ARM arm64)
        run: |
          pyinstaller --onedir --windowed --name AutoAssemble_v4 auto_assemble_v4.py
          echo "=== Architecture ==="
          file dist/AutoAssemble_v4.app/Contents/MacOS/AutoAssemble_v4
          codesign --force --deep --sign - dist/AutoAssemble_v4.app
          # TAR to preserve permissions & symlinks
          cd dist && tar czf ../arm-app.tar.gz AutoAssemble_v4.app

      - name: Upload ARM app (tar)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-tar
          path: arm-app.tar.gz

  # ────────────────────────────────────────────────────────
  # Merge Intel + ARM → Universal binary → DMG
  # ────────────────────────────────────────────────────────
  create-universal-dmg:
    needs: [build-macos-intel, build-macos-arm]
    runs-on: macos-14
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract apps from tar (preserves permissions)
        run: |
          mkdir -p intel-app arm-app
          tar xzf artifacts/macos-intel-tar/intel-app.tar.gz -C intel-app
          tar xzf artifacts/macos-arm-tar/arm-app.tar.gz -C arm-app
          echo "=== Intel ==="
          file intel-app/AutoAssemble_v4.app/Contents/MacOS/AutoAssemble_v4
          echo "=== ARM ==="
          file arm-app/AutoAssemble_v4.app/Contents/MacOS/AutoAssemble_v4

      - name: Create universal binary with lipo
        run: |
          # Use ARM app as the base (cp -R preserves permissions from tar)
          cp -R arm-app/AutoAssemble_v4.app universal-app.app

          # Merge ALL Mach-O binaries
          echo "=== Merging Mach-O binaries ==="
          find arm-app/AutoAssemble_v4.app -type f | while read arm_file; do
            rel_path="${arm_file#arm-app/AutoAssemble_v4.app/}"
            intel_file="intel-app/AutoAssemble_v4.app/${rel_path}"
            universal_file="universal-app.app/${rel_path}"
            
            [ ! -f "$intel_file" ] && continue
            
            if file "$arm_file" | grep -q "Mach-O"; then
              lipo -create "$intel_file" "$arm_file" -output "$universal_file" 2>/dev/null \
                && echo "  Merged: $rel_path" || true
            fi
          done

          echo ""
          echo "=== Universal binary verification ==="
          file universal-app.app/Contents/MacOS/AutoAssemble_v4
          lipo -info universal-app.app/Contents/MacOS/AutoAssemble_v4

      - name: Code sign universal app
        run: |
          # Clear quarantine and old signatures
          xattr -cr universal-app.app 2>/dev/null || true
          # Ad-hoc sign (required for Apple Silicon)
          codesign --force --deep --sign - universal-app.app
          echo "=== Signature info ==="
          codesign -dvv universal-app.app 2>&1 | head -5 || true

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R universal-app.app dmg_contents/AutoAssemble_v4.app
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "AutoAssemble v4" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            AutoAssemble_v4_Universal.dmg
          
          echo "=== DMG created ==="
          ls -lh AutoAssemble_v4_Universal.dmg

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: AutoAssemble_v4_macOS_Universal
          path: AutoAssemble_v4_Universal.dmg

  # ────────────────────────────────────────────────────────
  # Create GitHub Release with all assets
  # ────────────────────────────────────────────────────────
  release:
    needs: [build-windows, create-universal-dmg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoAssemble_v4_Windows
          path: release/windows

      - name: Download macOS Universal DMG
        uses: actions/download-artifact@v4
        with:
          name: AutoAssemble_v4_macOS_Universal
          path: release/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/auto_assemble_v4.exe
            release/macos/AutoAssemble_v4_Universal.dmg
          generate_release_notes: true
